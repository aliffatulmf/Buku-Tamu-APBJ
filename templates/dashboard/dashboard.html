<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
        integrity="sha256-2FMn2Zx6PuH5tdBQDRNwrOo60ts5wWPC9R8jK67b3t4=" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/toastify-js@1.12.0/src/toastify.min.css">
    <link rel="stylesheet" type="text/css" href="/assets/vendors/iconly/bold.css">
    <link rel="stylesheet" type="text/css" href="/assets/css/app.css">
</head>

<body>
    <div id="app">
        <div id="main" class="layout-horizontal">
            <header class="mb-5">
                <nav class="main-navbar">
                    <div class="container">
                        <ul>
                            <li class="menu-item">
                                <a href="/" class="menu-link">
                                    <i class="fa-solid fa-house"></i>
                                    <span class="span-text text-uppercase">beranda</span>
                                </a>
                            </li>
                            <li class="menu-item">
                                <a href="/pemda/terdaftar" class="menu-link">
                                    <i class="fa-solid fa-building-user"></i>
                                    <span class="span-text text-uppercase">pemda</span>
                                </a>
                            </li>
                            <li class="menu-item">
                                <a href="/penyedia/terdaftar" class="menu-link">
                                    <i class="fa-solid fa-building-user"></i>
                                    <span class="span-text text-uppercase">penyedia</span>
                                </a>
                            </li>
                            <li class="menu-item">
                                <a href="/instansi/terdaftar" class="menu-link">
                                    <i class="fa-solid fa-building"></i>
                                    <span class="span-text text-uppercase">instansi</span>
                                </a>
                            </li>
                            <li class="menu-item">
                                <a href="/pokja/terdaftar" class="menu-link">
                                    <i class="fa-solid fa-list-check"></i>
                                    <span class="span-text text-uppercase">pokja</span>
                                </a>
                            </li>
                            <li class="menu-item">
                                <a href="/credits" class="menu-link">
                                    <i class="fa-solid fa-medal"></i>
                                    <span class="span-text text-uppercase">tentang</span>
                                </a>
                            </li>
                        </ul>
                    </div>
                </nav>
            </header>

            <div class="content-wrapper container">
                <div class="page-content">
                    <!-- Stats Cards Row -->
                    <section class="row">
                        <div class="col-xl-3 col-md-6">
                            <div class="card">
                                <div class="card-body px-3 py-4-5">
                                    <div class="row">
                                        <div class="col-md-4">
                                            <div class="stats-icon red">
                                                <i class="iconly-boldUser"></i>
                                            </div>
                                        </div>
                                        <div class="col-md-8">
                                            <h6 class="text-muted font-semibold">Pemda</h6>
                                            <h6 class="font-extrabold mb-0">{{ .pemda }}</h6>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="col-xl-3 col-md-6">
                            <div class="card">
                                <div class="card-body px-3 py-4-5">
                                    <div class="row">
                                        <div class="col-md-4">
                                            <div class="stats-icon purple">
                                                <i class="iconly-boldUser1"></i>
                                            </div>
                                        </div>
                                        <div class="col-md-8">
                                            <h6 class="text-muted font-semibold">Penyedia</h6>
                                            <h6 class="font-extrabold mb-0">{{ .provider }}</h6>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="col-xl-3 col-md-6">
                            <div class="card">
                                <div class="card-body px-3 py-4-5">
                                    <div class="row">
                                        <div class="col-md-4">
                                            <div class="stats-icon blue">
                                                <i class="iconly-boldWork"></i>
                                            </div>
                                        </div>
                                        <div class="col-md-8">
                                            <h6 class="text-muted font-semibold">Instansi</h6>
                                            <h6 class="font-extrabold mb-0">{{ .instansi }} aktif</h6>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="col-xl-3 col-md-6">
                            <div class="card">
                                <div class="card-body px-3 py-4-5">
                                    <div class="row">
                                        <div class="col-md-4">
                                            <div class="stats-icon green">
                                                <i class="iconly-boldProfile"></i>
                                            </div>
                                        </div>
                                        <div class="col-md-8">
                                            <h6 class="text-muted font-semibold">Pokja</h6>
                                            <h6 class="font-extrabold mb-0">{{ .pokja }} aktif</h6>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </section>

                    <!-- Export Section -->
                    <section class="row mt-4">
                        <div class="col-12">
                            <div class="card">
                                <div class="card-header">
                                    <h4>Export to XLSX</h4>
                                </div>
                                <div class="card-body">
                                    <form>
                                        <input type="hidden" name="qf" value="q">
                                        <div class="row">
                                            <div class="col-md-4 mb-3">
                                                <label class="form-label">Tabel</label>
                                                <select class="form-select" name="tabel" id="tabel">
                                                    <option value="pemda">PEMDA</option>
                                                    <option value="penyedia">PENYEDIA</option>
                                                </select>
                                            </div>
                                            <div class="col-md-4 mb-3">
                                                <label class="form-label">From <sup
                                                        class="text-danger"><i>wajib</i></sup></label>
                                                <input type="date" class="form-control" name="from" id="from">
                                            </div>
                                            <div class="col-md-4 mb-3">
                                                <label class="form-label">To <sup
                                                        class="text-danger"><i>wajib</i></sup></label>
                                                <input type="date" class="form-control" name="to" id="to">
                                            </div>
                                        </div>
                                        <button type="button" class="btn btn-primary" id="export">
                                            <i class="fa-solid fa-download me-1"></i> Export
                                        </button>
                                    </form>
                                </div>
                            </div>
                        </div>
                    </section>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/jquery@4.0.0/dist/jquery.min.js"
        integrity="sha256-OaVG6prZf4v69dPg6PhVattBXkcOWQB62pdZ3ORyrao=" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha256-5P1JGBOIxI7FBAvT/mb1fCnI5n/NhQKzNUuW7Hq0fMc=" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/toastify-js@1.12.0/src/toastify.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@7.2.0/js/all.min.js"
        integrity="sha256-KIvD/OMxkCLYz1tU9IH4cPio8Qidomavw3W3ZGwNrpQ=" crossorigin="anonymous"></script>
    <script>
        $("button#export").click(function () {
            var tabel = $("#tabel").val()
            var from = $("#from").val()
            var to = $("#to").val()

            $.ajax({
                url: `/export?qf=q&tabel=${tabel}&from=${from}&to=${to}`,
                method: "GET",
                success: function () {
                    Toastify({
                        text: "Export success",
                        duration: 3000,
                        close: false,
                        gravity: "top",
                        position: "center",
                        backgroundColor: "#4fbe87",
                    }).showToast();
                },
                error: function () {
                    Toastify({
                        text: "Error",
                        duration: 3000,
                        close: false,
                        gravity: "top",
                        position: "center",
                        backgroundColor: "#dc3545",
                    }).showToast();
                }
            })
        })
    </script>
</body>

</html>
