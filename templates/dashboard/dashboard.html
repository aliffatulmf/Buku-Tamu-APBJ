<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="/assets/css/bootstrap.css">
    <link rel="stylesheet" type="text/css" href="/assets/vendors/toastify/toastify.css">
    <link rel="stylesheet" type="text/css" href="/assets/vendors/iconly/bold.css">
    <link rel="stylesheet" type="text/css" href="/assets/vendors/perfect-scrollbar/perfect-scrollbar.css">
    <link rel="stylesheet" type="text/css" href="/assets/vendors/bootstrap-icons/bootstrap-icons.css">
    <link rel="stylesheet" type="text/css" href="/assets/css/app.css">
    <link rel="stylesheet" type="text/css" href="/assets/fontawesome/css/all.min.css">
    <style>
        .main-navbar .menu-link span {
            text-transform: uppercase;
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 0.03em;
        }
    </style>
</head>

<body>
    <div id="app">
        <div id="main" class="layout-horizontal">
            <header class="mb-5">
                <div class="header-top">
                    <div class="container">
                        <div class="logo text-start">
                            <h1 style="font-family: 'Inter', sans-serif;">Buku Tamu</h1>
                        </div>
                    </div>
                </div>
                <nav class="main-navbar">
                    <div class="container">
                        <ul>
                            <li class="menu-item">
                                <a href="/" class="menu-link">
                                    <i class="fa-solid fa-house"></i>
                                    <span>Dashboard</span>
                                </a>
                            </li>
                            <li class="menu-item">
                                <a href="/pemda/terdaftar" class="menu-link">
                                    <i class="fa-solid fa-building-user"></i>
                                    <span>Pemda</span>
                                </a>
                            </li>
                            <li class="menu-item">
                                <a href="/penyedia/terdaftar" class="menu-link">
                                    <i class="fa-solid fa-building-user"></i>
                                    <span>Penyedia</span>
                                </a>
                            </li>
                            <li class="menu-item">
                                <a href="/instansi/terdaftar" class="menu-link">
                                    <i class="fa-solid fa-building"></i>
                                    <span>Instansi</span>
                                </a>
                            </li>
                            <li class="menu-item">
                                <a href="/pokja/terdaftar" class="menu-link">
                                    <i class="fa-solid fa-list-check"></i>
                                    <span>Pokja Status</span>
                                </a>
                            </li>
                            <li class="menu-item">
                                <a href="/credits" class="menu-link">
                                    <i class="fa-solid fa-medal"></i>
                                    <span>Tentang</span>
                                </a>
                            </li>
                        </ul>
                    </div>
                </nav>
            </header>

            <div class="content-wrapper container">
                <div class="page-content">
                    <!-- Stats Cards Row -->
                    <section class="row">
                        <div class="col-xl-3 col-md-6">
                            <div class="card">
                                <div class="card-body px-3 py-4-5">
                                    <div class="row">
                                        <div class="col-md-4">
                                            <div class="stats-icon red">
                                                <i class="iconly-boldUser"></i>
                                            </div>
                                        </div>
                                        <div class="col-md-8">
                                            <h6 class="text-muted font-semibold">Pemda</h6>
                                            <h6 class="font-extrabold mb-0">{{ .pemda }}</h6>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="col-xl-3 col-md-6">
                            <div class="card">
                                <div class="card-body px-3 py-4-5">
                                    <div class="row">
                                        <div class="col-md-4">
                                            <div class="stats-icon purple">
                                                <i class="iconly-boldUser1"></i>
                                            </div>
                                        </div>
                                        <div class="col-md-8">
                                            <h6 class="text-muted font-semibold">Penyedia</h6>
                                            <h6 class="font-extrabold mb-0">{{ .provider }}</h6>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="col-xl-3 col-md-6">
                            <div class="card">
                                <div class="card-body px-3 py-4-5">
                                    <div class="row">
                                        <div class="col-md-4">
                                            <div class="stats-icon blue">
                                                <i class="iconly-boldWork"></i>
                                            </div>
                                        </div>
                                        <div class="col-md-8">
                                            <h6 class="text-muted font-semibold">Instansi</h6>
                                            <h6 class="font-extrabold mb-0">{{ .instansi }} aktif</h6>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="col-xl-3 col-md-6">
                            <div class="card">
                                <div class="card-body px-3 py-4-5">
                                    <div class="row">
                                        <div class="col-md-4">
                                            <div class="stats-icon green">
                                                <i class="iconly-boldProfile"></i>
                                            </div>
                                        </div>
                                        <div class="col-md-8">
                                            <h6 class="text-muted font-semibold">Pokja</h6>
                                            <h6 class="font-extrabold mb-0">{{ .pokja }} aktif</h6>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </section>

                    <!-- Export Section -->
                    <section class="row mt-4">
                        <div class="col-12">
                            <div class="card">
                                <div class="card-header">
                                    <h4>Export to XLSX</h4>
                                </div>
                                <div class="card-body">
                                    <form>
                                        <input type="hidden" name="qf" value="q">
                                        <div class="row">
                                            <div class="col-md-4 mb-3">
                                                <label class="form-label">Tabel</label>
                                                <select class="form-select" name="tabel" id="tabel">
                                                    <option value="pemda">PEMDA</option>
                                                    <option value="penyedia">PENYEDIA</option>
                                                </select>
                                            </div>
                                            <div class="col-md-4 mb-3">
                                                <label class="form-label">From <sup class="text-danger"><i>wajib</i></sup></label>
                                                <input type="date" class="form-control" name="from" id="from">
                                            </div>
                                            <div class="col-md-4 mb-3">
                                                <label class="form-label">To <sup class="text-danger"><i>wajib</i></sup></label>
                                                <input type="date" class="form-control" name="to" id="to">
                                            </div>
                                        </div>
                                        <button type="button" class="btn btn-primary" id="export">
                                            <i class="fa-solid fa-download me-1"></i> Export
                                        </button>
                                    </form>
                                </div>
                            </div>
                        </div>
                    </section>
                </div>
            </div>
        </div>
    </div>

    <script src="/assets/js/jquery.min.js"></script>
    <script src="/assets/vendors/perfect-scrollbar/perfect-scrollbar.min.js"></script>
    <script src="/assets/js/bootstrap.bundle.min.js"></script>
    <script src="/assets/vendors/toastify/toastify.js"></script>
    <script src="/assets/fontawesome/js/all.min.js"></script>
    <script>
        $("button#export").click(function () {
            var tabel = $("#tabel").val()
            var from = $("#from").val()
            var to = $("#to").val()

            $.ajax({
                url: `/export?qf=q&tabel=${tabel}&from=${from}&to=${to}`,
                method: "GET",
                success: function () {
                    Toastify({
                        text: "Export success",
                        duration: 3000,
                        close: false,
                        gravity: "top",
                        position: "center",
                        backgroundColor: "#4fbe87",
                    }).showToast();
                },
                error: function () {
                    Toastify({
                        text: "Error",
                        duration: 3000,
                        close: false,
                        gravity: "top",
                        position: "center",
                        backgroundColor: "#dc3545",
                    }).showToast();
                }
            })
        })
    </script>
</body>

</html>
