<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Buku Tamu - Pilih Role</title>

    <!-- Bootstrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
        integrity="sha256-2FMn2Zx6PuH5tdBQDRNwrOo60ts5wWPC9R8jK67b3t4=" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
        integrity="sha256-pdY4ejLKO67E0CM2tbPtq1DJ3VGDVVdqAR6j3ZwdiE4=" crossorigin="anonymous">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@7.2.0/css/all.min.css" integrity="sha256-MVopmdyC2tYTiJ8wlktf0uh0v4NgT+vNdyVFepi7Q0c=" crossorigin="anonymous">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: #ffffff;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
        }

        /* Navbar */
        .navbar {
            background: #ffffff;
            border-bottom: 1px solid #e5e7eb;
            padding: 1rem 0;
        }

        .navbar-brand {
            font-weight: 700;
            font-size: 1.25rem;
            color: #1a1a2e !important;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.03em;
        }

        .navbar-brand i {
            color: #4361ee;
        }

        .btn-keluar {
            font-size: 0.875rem;
            padding: 0.5rem 1.25rem;
            border-radius: 8px;
            font-weight: 600;
            color: #64748b;
            border: 1px solid #e2e8f0;
            background: transparent;
            transition: all 0.2s ease;
        }

        .btn-keluar:hover {
            color: #ef4444;
            border-color: #ef4444;
            background: rgba(239, 68, 68, 0.05);
        }

        /* Main Content */
        .main-content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .role-section {
            text-align: center;
            max-width: 800px;
            width: 100%;
        }

        .role-title {
            font-size: 2rem;
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 0.5rem;
        }

        .role-subtitle {
            font-size: 1rem;
            color: #64748b;
            margin-bottom: 3rem;
        }

        /* Role Cards */
        .role-cards {
            display: flex;
            gap: 2rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .role-card {
            flex: 1;
            min-width: 280px;
            max-width: 350px;
            background: #ffffff;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            padding: 3rem 2rem;
            text-decoration: none;
            color: inherit;
            transition: all 0.2s ease;
            position: relative;
        }

        .role-card:hover {
            border-color: #4361ee;
            transform: translateY(-4px);
        }

        .role-card-icon {
            width: 80px;
            height: 80px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            font-size: 2rem;
            transition: all 0.2s ease;
        }

        .role-card:nth-child(1) .role-card-icon {
            background: rgba(67, 97, 238, 0.1);
            color: #4361ee;
        }

        .role-card:nth-child(2) .role-card-icon {
            background: rgba(124, 58, 237, 0.1);
            color: #7c3aed;
        }

        .role-card:hover .role-card-icon {
            transform: scale(1.05);
        }

        .role-card-title {
            font-size: 1.25rem;
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 0.5rem;
        }

        .role-card-desc {
            font-size: 0.875rem;
            color: #64748b;
            margin-bottom: 1.5rem;
            line-height: 1.5;
        }

        .role-card-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.625rem 1.25rem;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.875rem;
            transition: all 0.2s ease;
        }

        .role-card:nth-child(1) .role-card-btn {
            background: #4361ee;
            color: #ffffff;
        }

        .role-card:nth-child(2) .role-card-btn {
            background: #7c3aed;
            color: #ffffff;
        }

        .role-card:hover .role-card-btn {
            transform: translateX(4px);
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 1.5rem;
            color: #94a3b8;
            font-size: 0.8rem;
            border-top: 1px solid #e5e7eb;
        }

        /* Responsive */
        @media (max-width: 640px) {
            .role-title {
                font-size: 1.5rem;
            }

            .role-cards {
                flex-direction: column;
                align-items: center;
            }

            .role-card {
                width: 100%;
                max-width: 100%;
            }
        }
    </style>
</head>

<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="/user">
                <i class="fa-solid fa-book-open"></i>
                Buku Tamu
            </a>
            <a href="javascript:window.open('', '_self').close();" class="btn btn-keluar">
                <i class="fa fa-power-off me-1"></i> Keluar
            </a>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
        <section class="role-section">
            <!-- <h1 class="role-title">Masuk sebagai</h1> -->
            <!-- <p class="role-subtitle">Pilih peran untuk melanjutkan</p> -->

            <div class="role-cards">
                <!-- PEMDA Card -->
                <a href="/pemda/registrasi" class="role-card">
                    <div class="role-card-icon">
                        <i class="fa-solid fa-building-columns"></i>
                    </div>
                    <h2 class="role-card-title">PEMERINTAH DAERAH</h2>
                    <p class="role-card-desc">Akses pengelolaan data tamu instansi</p>
                    <span class="role-card-btn">
                        Masuk <i class="fa-solid fa-arrow-right"></i>
                    </span>
                </a>

                <!-- PENYEDIA Card -->
                <a href="/penyedia/registrasi" class="role-card">
                    <div class="role-card-icon">
                        <i class="fa-solid fa-truck-fast"></i>
                    </div>
                    <h2 class="role-card-title">PENYEDIA</h2>
                    <p class="role-card-desc">Akses pendaftaran dan pengajuan barang/jasa</p>
                    <span class="role-card-btn">
                        Masuk <i class="fa-solid fa-arrow-right"></i>
                    </span>
                </a>
            </div>
        </section>
    </main>

    <!-- Footer -->
    <footer class="footer">
        Buku Tamu APBJ &copy;
        <script>document.write(new Date().getFullYear());</script>
    </footer>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha256-5P1JGBOIxI7FBAvT/mb1fCnI5n/NhQKzNUuW7Hq0fMc=" crossorigin="anonymous"></script>
</body>

</html>
